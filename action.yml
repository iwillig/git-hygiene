name: "Git Hygiene"
description: "Lint git commit messages for grammar (LanguageTool) and structure quality (LLM)"
author: "Shortcut"

branding:
  icon: "check-circle"
  color: "green"

inputs:
  github-token:
    description: "GitHub token for posting PR comments and fetching commits"
    required: true
    default: ${{ github.token }}

  llm-model:
    description: >
      LLM model to use for structure analysis.
      For remote providers: e.g. gpt-4o-mini, claude-3-haiku-20240307.
      For local MLX models: e.g. mlx-community/Qwen2.5-0.5B-Instruct-4bit.
    required: false
    default: "gpt-4o-mini"

  llm-api-key:
    description: "API key for a remote LLM provider. Not required when use-local-model is true."
    required: false
    default: ""

  use-local-model:
    description: >
      Run the LLM locally on the GitHub Actions runner using mlx-lm (CPU).
      No API key needed. Set llm-model to an MLX-compatible Hugging Face model.
      Recommended: mlx-community/Qwen2.5-0.5B-Instruct-4bit (278 MB, fastest).
    required: false
    default: "false"

  languagetool-url:
    description: "LanguageTool API base URL"
    required: false
    default: "https://api.languagetool.org/v2"

  languagetool-language:
    description: "Language code for LanguageTool (e.g. en-US, en-GB, de-DE)"
    required: false
    default: "en-US"

  ignore-patterns:
    description: "Newline-separated list of regex patterns for commit messages to skip (e.g. merge commits)"
    required: false
    default: |
      ^Merge\s
      ^Revert\s

  fail-on-error:
    description: "Whether to fail the check (exit 1) when issues are found"
    required: false
    default: "true"

runs:
  using: "composite"
  steps:
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: "3.13"

    - name: Install dependencies
      shell: bash
      run: |
        pip install llm requests
        if [ "${{ inputs.use-local-model }}" = "true" ]; then
          echo "📦 Installing mlx-lm (CPU) and llm-mlx for local model inference…"
          pip install "mlx-lm[cpu]" llm-mlx
          # MLX CPU backend JIT-compiles C++ kernels at runtime and hardcodes
          # "g++ -std=c++17 -O3 -Wall -fPIC -shared" (ignores $CXX / $CXXFLAGS).
          # g++-13 (Ubuntu 24.04 default) has a _Float128 typedef conflict.
          # Fix: replace /usr/bin/g++ with a wrapper that adds -fpermissive.
          # See: https://github.com/ml-explore/mlx/issues/2281
          if [ "$(uname)" = "Linux" ]; then
            echo "🔧 Installing g++ wrapper with -fpermissive for MLX _Float128 bug"
            REAL_GPP=$(readlink -f "$(which g++)")
            sudo mv /usr/bin/g++ /usr/bin/g++-original 2>/dev/null || true
            printf '#!/bin/bash\nexec "%s" -fpermissive "$@"\n' "$REAL_GPP" | sudo tee /usr/bin/g++ > /dev/null
            sudo chmod +x /usr/bin/g++
          fi
        fi

    - name: Run commit linter
      shell: bash
      env:
        GITHUB_TOKEN: ${{ inputs.github-token }}
        LLM_MODEL: ${{ inputs.llm-model }}
        LLM_API_KEY: ${{ inputs.llm-api-key }}
        USE_LOCAL_MODEL: ${{ inputs.use-local-model }}
        LANGUAGETOOL_URL: ${{ inputs.languagetool-url }}
        LANGUAGETOOL_LANGUAGE: ${{ inputs.languagetool-language }}
        IGNORE_PATTERNS: ${{ inputs.ignore-patterns }}
        FAIL_ON_ERROR: ${{ inputs.fail-on-error }}
        PR_NUMBER: ${{ github.event.pull_request.number }}
        REPO: ${{ github.repository }}
      run: python ${{ github.action_path }}/lint_commits.py
