name: CI

on:
  push:
    branches: [main]
  pull_request:
    types: [opened, synchronize, reopened]

permissions:
  contents: read
  pull-requests: write

jobs:
  # -- Unit tests (push + PR) ------------------------------------------------
  test:
    name: Unit Tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install dependencies
        run: pip install requests llm llm-ollama pytest

      - name: Run tests
        run: pytest tests/ -v --ignore=tests/test_integration_ollama.py

  # -- Dogfood on PR: lint PR commits, post comment --------------------------
  lint-pr:
    name: Lint PR Commits
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    needs: test
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Run Git Hygiene on this PR
        uses: ./
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          use-local-model: "true"
          llm-model: "qwen2.5:0.5b"
          fail-on-error: "false"

  # -- Dogfood on push to main: lint the merged commits ----------------------
  lint-push:
    name: Lint Pushed Commits
    runs-on: ubuntu-latest
    if: github.event_name == 'push'
    needs: test
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install Python dependencies
        run: pip install requests llm llm-ollama

      - name: Set up Ollama
        uses: ai-action/setup-ollama@v2

      - name: Pull model
        run: ollama pull qwen2.5:0.5b

      - name: Lint commits pushed to main
        run: |
          BEFORE="${{ github.event.before }}"
          AFTER="${{ github.sha }}"

          if [ "$BEFORE" = "0000000000000000000000000000000000000000" ]; then
            echo "First push -- linting HEAD commit only"
            python lint_local.py --last 1 --model qwen2.5:0.5b
          else
            echo "Linting commits ${BEFORE:0:8}..${AFTER:0:8}"
            python lint_local.py --range "${BEFORE}..${AFTER}" --model qwen2.5:0.5b
          fi
